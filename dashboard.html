<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Dashboard — Guided Path Noida</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--bg:#0a192f;--surface:#112240;--border:#1e3a5f;--text:#c0c0c0;--heading:#00e5ff;--link:#ffd54f;--muted:#607d8b;--good:#69ff47;--warn:#ffd54f;--bad:#ff5252;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 48px;}
    body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
    .wrap{position:relative;z-index:1;max-width:640px;margin:0 auto;padding:0 16px;}
    .top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 0;max-width:640px;margin:0 auto;position:relative;z-index:1;}
    .brand{display:flex;align-items:center;gap:10px;}
    .brand img{height:36px;width:auto;display:none;}
    .brand img.loaded{display:block;}
    .brand-text .name{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:var(--heading);line-height:1;}
    .brand-text .sub{font-size:0.68rem;color:var(--muted);margin-top:2px;}
    .logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:0.8rem;padding:8px 16px;border-radius:8px;cursor:pointer;}
    .logout-btn:active{border-color:var(--bad);color:var(--bad);}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-top:16px;animation:fadeUp 0.4s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
    .month-heading{font-family:'Rajdhani',sans-serif;font-size:0.85rem;font-weight:600;color:var(--muted);text-align:center;letter-spacing:2px;text-transform:uppercase;margin-top:18px;margin-bottom:2px;position:relative;z-index:1;}
    .welcome-card{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--heading);border-radius:16px;padding:20px;margin-top:10px;animation:fadeUp 0.4s ease both;}
    .welcome-card h1{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--heading);}
    .welcome-card p{font-size:0.82rem;color:var(--muted);margin-top:4px;}
    .card-title{font-family:'Rajdhani',sans-serif;font-size:0.8rem;font-weight:600;color:var(--link);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
    .card-title::after{content:'';flex:1;height:1px;background:var(--border);}
    .info-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid rgba(30,58,95,0.5);}
    .info-row:last-child{border-bottom:none;padding-bottom:0;}
    .info-row:first-child{padding-top:0;}
    .info-label{font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px;min-width:130px;flex-shrink:0;}
    .info-value{font-size:0.95rem;color:#c0c0c0;font-weight:500;flex:1;}
    .rank-hero{display:flex;gap:12px;margin-bottom:4px;}
    .rank-box{flex:1;background:linear-gradient(135deg,rgba(0,229,255,0.08),rgba(0,229,255,0.02));border:1px solid rgba(0,229,255,0.2);border-radius:12px;padding:14px;text-align:center;}
    .rank-box .rbl{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
    .rank-box .rbv{font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;color:var(--heading);line-height:1.1;margin-top:4px;}
    .rank-box .rbs{font-size:0.72rem;color:var(--muted);margin-top:2px;}
    .avg-box{flex:1;background:linear-gradient(135deg,rgba(255,213,79,0.08),rgba(255,213,79,0.02));border:1px solid rgba(255,213,79,0.2);border-radius:12px;padding:14px;text-align:center;}
    .avg-box .rbl{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
    .avg-box .rbv{font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;color:var(--link);line-height:1.1;margin-top:4px;}
    .badges-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;}
    .badge-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;font-size:0.8rem;font-weight:600;}
    .badge-chip.legend{background:rgba(255,213,79,0.15);border:1px solid rgba(255,213,79,0.4);color:#ffd54f;}
    .badge-chip.striker{background:rgba(0,229,255,0.1);border:1px solid rgba(0,229,255,0.3);color:var(--heading);}
    .badge-chip.onfire{background:rgba(255,82,82,0.1);border:1px solid rgba(255,82,82,0.3);color:#ff7043;}
    .badge-chip.elite{background:rgba(105,255,71,0.1);border:1px solid rgba(105,255,71,0.3);color:var(--good);}
    .badge-chip.consistent{background:rgba(0,229,255,0.08);border:1px solid rgba(0,229,255,0.2);color:var(--heading);}
    .badge-chip.rocket{background:rgba(255,152,0,0.1);border:1px solid rgba(255,152,0,0.3);color:#ffb74d;}
    .fees-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:0.82rem;font-weight:600;}
    .fees-badge.paid{background:rgba(105,255,71,0.12);color:var(--good);border:1px solid rgba(105,255,71,0.3);}
    .fees-badge.due{background:rgba(255,213,79,0.12);color:var(--warn);border:1px solid rgba(255,213,79,0.3);}
    .fees-badge.late{background:rgba(255,82,82,0.12);color:var(--bad);border:1px solid rgba(255,82,82,0.3);}
    .remark-box{background:rgba(255,213,79,0.05);border:1px solid rgba(255,213,79,0.15);border-radius:10px;padding:14px 16px;font-size:0.9rem;color:#c0c0c0;line-height:1.65;}
    .month-selector-wrap{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
    .month-selector-wrap label{font-size:0.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
    select.month-select{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.9rem;outline:none;cursor:pointer;}
    select.month-select:focus{border-color:var(--heading);}
    .test-item{padding:12px 0;border-bottom:1px solid rgba(30,58,95,0.5);}
    .test-item:last-child{border-bottom:none;padding-bottom:0;}
    .test-item:first-child{padding-top:0;}
    .test-name{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;color:var(--heading);}
    .test-score-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
    .test-score{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;color:var(--link);}
    .test-score span{font-size:0.85rem;color:var(--muted);font-weight:400;}
    .progress-wrap{flex:1;margin:0 14px;}
    .progress-bg{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:3px;transition:width 1s ease;}
    .progress-fill.good{background:var(--good);}
    .progress-fill.warn{background:var(--warn);}
    .progress-fill.bad{background:var(--bad);}
    .score-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.78rem;font-weight:600;flex-shrink:0;}
    .score-badge.good{background:rgba(105,255,71,0.1);color:var(--good);}
    .score-badge.warn{background:rgba(255,213,79,0.1);color:var(--warn);}
    .score-badge.bad{background:rgba(255,82,82,0.1);color:var(--bad);}
    .minor-avg-row{display:flex;justify-content:space-between;align-items:center;margin-top:14px;padding-top:12px;border-top:1px solid rgba(30,58,95,0.5);}
    .minor-avg-label{font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
    .minor-avg-val{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;color:var(--heading);}
    .chart-wrap{position:relative;height:200px;margin-top:4px;}
    .major-item{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid rgba(30,58,95,0.4);}
    .major-item:last-child{border-bottom:none;}
    .major-month{font-size:0.82rem;color:var(--muted);min-width:90px;flex-shrink:0;}
    .major-bar{flex:1;margin:0 12px;}
    .major-bar-bg{height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
    .major-bar-fill{height:100%;border-radius:3px;background:var(--heading);transition:width 1.2s ease;}
    .major-score{font-family:'Rajdhani',sans-serif;font-size:0.95rem;font-weight:600;color:var(--link);min-width:40px;text-align:right;}
    .att-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid rgba(30,58,95,0.4);}
    .att-row:last-child{border-bottom:none;}
    .att-month{font-size:0.85rem;color:var(--text);min-width:90px;}
    .att-bar{flex:1;margin:0 12px;}
    .att-bar-bg{height:5px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden;}
    .att-bar-fill{height:100%;border-radius:3px;transition:width 1.2s ease;}
    .att-bar-fill.good{background:var(--good);}
    .att-bar-fill.warn{background:var(--warn);}
    .att-bar-fill.bad{background:var(--bad);}
    .att-pct{font-family:'Rajdhani',sans-serif;font-size:0.9rem;font-weight:600;color:var(--link);min-width:60px;text-align:right;}
    .empty{text-align:center;padding:20px 0;color:var(--muted);font-size:0.85rem;}
    .dash-footer{text-align:center;font-size:0.75rem;color:var(--muted);margin-top:28px;line-height:1.8;}
    .dash-footer a{color:var(--link);text-decoration:none;}
    .error-state{text-align:center;padding:80px 20px;}
    .error-state h2{font-family:'Rajdhani',sans-serif;color:var(--bad);font-size:1.4rem;margin-bottom:10px;}
    .error-state p{color:var(--muted);font-size:0.9rem;}
    .error-state a{display:inline-block;margin-top:20px;color:var(--link);text-decoration:none;border:1px solid var(--link);padding:10px 24px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:1rem;}
  </style>
</head>
<body>
<div class="top-bar">
  <div class="brand">
    <img src="YOUR_LOGO_URL_HERE" alt="GPN" id="logoImg"/>
    <div class="brand-text"><div class="name">Guided Path Noida</div><div class="sub">Student Performance Portal</div></div>
  </div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>
<div class="wrap" id="app"></div>
<script>
const SESSION_MONTHS=[{key:"Apr",label:"April"},{key:"May",label:"May"},{key:"Jun",label:"June"},{key:"Jul",label:"July"},{key:"Aug",label:"August"},{key:"Sep",label:"September"},{key:"Oct",label:"October"},{key:"Nov",label:"November"},{key:"Dec",label:"December"},{key:"Jan",label:"January"},{key:"Feb",label:"February"},{key:"Mar",label:"March"}];
function curMK(){const k=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return k[new Date().getMonth()];}
function fmtDate(v){
  if(!v||!String(v).trim())return'—';const s=String(v).trim();
  if(s.match(/^\d{4}-\d{2}-\d{2}/)){const d=new Date(s);if(!isNaN(d))return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
  const n=parseFloat(s);if(!isNaN(n)&&n>40000){const d=new Date((n-25569)*86400*1000);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
  return s;
}
const app=document.getElementById('app');
const raw=sessionStorage.getItem('gpn_student');
const li=document.getElementById('logoImg');
if(li&&!li.src.includes('YOUR_LOGO_URL_HERE'))li.classList.add('loaded');
const nowMK=curMK();
const nowML=new Date().toLocaleString('en-IN',{month:'long',year:'numeric'});
let barCI=null,lineCI=null;
if(!raw){app.innerHTML=`<div class="error-state"><h2>Session Expired</h2><p>Please log in again.</p><a href="index.html">← Back to Login</a></div>`;}
else{go(JSON.parse(raw),nowMK);}
function gv(d,k){const v=d[k];return(v==null||String(v).trim()==='')? null:String(v).trim();}
function pct(s,m){const sv=parseFloat(s),mv=parseFloat(m);if(isNaN(sv)||isNaN(mv)||mv===0)return null;return Math.round(sv/mv*100);}
function bc(p){return p===null?'warn':p>=75?'good':p>=50?'warn':'bad';}
function feesBadge(st){
  if(!st)return'<span class="fees-badge due">⏳ Due</span>';
  const s=st.toLowerCase();
  if(s==='paid')return'<span class="fees-badge paid">✓ Paid</span>';
  if(s==='late')return'<span class="fees-badge late">⚠ Late</span>';
  return'<span class="fees-badge due">⏳ Due</span>';
}
function badgeChip(b){
  const bl=b.toLowerCase();
  let c='';
  if(bl.includes('legend'))c='legend';else if(bl.includes('striker'))c='striker';
  else if(bl.includes('fire'))c='onfire';else if(bl.includes('elite'))c='elite';
  else if(bl.includes('consistent'))c='consistent';else if(bl.includes('rocket'))c='rocket';
  return`<span class="badge-chip ${c}">${b}</span>`;
}
function getTests(d,mk){return[1,2,3,4].map(n=>{const sc=gv(d,`${mk}\nM${n} Score`),mx=gv(d,`${mk}\nM${n} Max`);return{label:`Minor Test ${n}`,score:sc,max:mx,p:pct(sc,mx)};}).filter(t=>t.score&&parseFloat(t.score)>0);}
function getAvg(d,mk){return gv(d,`${mk}\nMinor\nAvg%`);}
function getMaj(d,mk){const sc=gv(d,`${mk}\nMajor\nScore`),mx=gv(d,`${mk}\nMajor\nMax`);if(!sc||!mx||parseFloat(sc)===0||parseFloat(mx)===0)return null;return{score:sc,max:mx,p:pct(sc,mx)};}

function go(data,selMK){
  const name=gv(data,'Name')||'Student';
  const sid=gv(data,'StudentID')||'—';
  const fn=gv(data,"Father's Name")||'—';
  const cls=gv(data,'Class')||'—';
  const sch=gv(data,'School')||'—';
  const ph=gv(data,'Phone')||'—';
  const doj=fmtDate(gv(data,'Date of Joining'));
  const fs=gv(data,'Fees Status')||'';
  const fa=gv(data,'Fees Amount')||'—';
  const rank=gv(data,'Rank');
  const avg=gv(data,'Overall Avg %');
  const badges=gv(data,'Badges')||'';
  const remark=gv(data,'Remarks');
  const att=data['_attendance']||{};

  // Performance card
  const avgD=avg?parseFloat(avg).toFixed(1)+'%':'—';
  const badgeList=badges?badges.split(',').map(b=>b.trim()).filter(Boolean):[];
  let html=`<div class="month-heading">📅 ${nowML}</div>
  <div class="welcome-card"><h1>Welcome, ${name} 👋</h1><p>Your academic performance summary — updated by your teacher.</p></div>
  <div class="card"><div class="card-title">🏅 My Performance</div>
    <div class="rank-hero">
      <div class="rank-box"><div class="rbl">Overall Rank</div><div class="rbv">#${rank||'—'}</div><div class="rbs">Among all students</div></div>
      <div class="avg-box"><div class="rbl">Overall Avg</div><div class="rbv">${avgD}</div></div>
    </div>`;
  if(badgeList.length>0){html+=`<div class="badges-wrap">${badgeList.map(badgeChip).join('')}</div>`;}
  html+=`</div>`;

  // Info card
  html+=`<div class="card"><div class="card-title">👤 Student Information</div>
    <div class="info-row"><div class="info-label">Student ID</div><div class="info-value">${sid}</div></div>
    <div class="info-row"><div class="info-label">Name</div><div class="info-value">${name}</div></div>
    <div class="info-row"><div class="info-label">Father's Name</div><div class="info-value">${fn}</div></div>
    <div class="info-row"><div class="info-label">Class</div><div class="info-value">${cls}</div></div>
    <div class="info-row"><div class="info-label">School</div><div class="info-value">${sch}</div></div>
    <div class="info-row"><div class="info-label">Phone</div><div class="info-value">${ph}</div></div>
    <div class="info-row"><div class="info-label">Date of Joining</div><div class="info-value">${doj}</div></div>
    <div class="info-row"><div class="info-label">Fees Amount</div><div class="info-value">₹${fa}</div></div>
    <div class="info-row"><div class="info-label">Fees Status</div><div class="info-value">${feesBadge(fs)}</div></div>
  </div>`;

  if(remark)html+=`<div class="card"><div class="card-title">✏️ Teacher's Remarks</div><div class="remark-box">${remark}</div></div>`;

  // Attendance
  const attKeys=Object.keys(att);
  html+=`<div class="card"><div class="card-title">📅 Attendance</div>`;
  if(attKeys.length===0){html+=`<div class="empty">No attendance data yet.</div>`;}
  else{attKeys.forEach(mk=>{const m=att[mk],p=m.total>0?Math.round(m.present/m.total*100):0,lb=SESSION_MONTHS.find(x=>x.key===mk)?.label||mk,bc2=p>=90?'good':p>=75?'warn':'bad';html+=`<div class="att-row"><div class="att-month">${lb}</div><div class="att-bar"><div class="att-bar-bg"><div class="att-bar-fill ${bc2}" style="width:${p}%"></div></div></div><div class="att-pct">${p}%<br/><span style="font-size:0.7rem;color:var(--muted)">${m.present}/${m.total} days</span></div></div>`;});}
  html+=`</div>`;

  // Minor tests with dropdown
  const mOpts=SESSION_MONTHS.map(m=>({...m,hasData:getTests(data,m.key).length>0||getAvg(data,m.key)})).filter(m=>m.hasData||m.key===nowMK);
  const tests=getTests(data,selMK);
  const avgV=getAvg(data,selMK);
  const selLabel=SESSION_MONTHS.find(m=>m.key===selMK)?.label||selMK;
  html+=`<div class="card"><div class="card-title">📋 GPN Minor Tests</div>
    <div class="month-selector-wrap"><label>Month</label><select class="month-select" onchange="switchMonth(this.value)">`;
  mOpts.forEach(m=>{html+=`<option value="${m.key}"${m.key===selMK?' selected':''}>${m.label}</option>`;});
  html+=`</select></div>`;
  if(tests.length===0){html+=`<div class="empty">No minor test scores for ${selLabel} yet.</div>`;}
  else{
    tests.forEach(t=>{const cls2=bc(t.p);html+=`<div class="test-item"><div class="test-name">${t.label}</div><div class="test-score-row"><div class="test-score">${t.score}<span>/${t.max}</span></div><div class="progress-wrap"><div class="progress-bg"><div class="progress-fill ${cls2}" style="width:${t.p??0}%"></div></div></div><span class="score-badge ${cls2}">${t.p!==null?t.p+'%':'—'}</span></div></div>`;});
    if(avgV&&parseFloat(avgV)>0){html+=`<div class="minor-avg-row"><div class="minor-avg-label">Monthly Avg</div><div class="minor-avg-val">${Math.round(parseFloat(avgV))}%</div></div>`;}
  }
  html+=`</div>`;
  if(tests.length>0)html+=`<div class="card"><div class="card-title">📊 Minor Test Chart — ${selLabel}</div><div class="chart-wrap"><canvas id="barChart"></canvas></div></div>`;

  // Major tests
  const majors=SESSION_MONTHS.map(m=>{const mj=getMaj(data,m.key);return mj?{month:m.label,...mj}:null;}).filter(Boolean);
  html+=`<div class="card"><div class="card-title">🏆 GPN Major Test — Monthly Progress</div>`;
  if(majors.length===0){html+=`<div class="empty">No major test scores recorded yet.</div>`;}
  else{majors.forEach(t=>{html+=`<div class="major-item"><div class="major-month">${t.month}</div><div class="major-bar"><div class="major-bar-bg"><div class="major-bar-fill" style="width:${t.p}%"></div></div></div><div class="major-score">${t.p}%</div></div>`;});}
  html+=`</div>`;
  if(majors.length>1)html+=`<div class="card"><div class="card-title">📈 Major Test Progress Graph</div><div class="chart-wrap"><canvas id="lineChart"></canvas></div></div>`;

  html+=`<div class="dash-footer">Guided Path Noida &nbsp;·&nbsp; <a href="https://www.guidedpathnoida.in" target="_blank">guidedpathnoida.in</a><br/>Having trouble? <a href="mailto:gpn.care@gmail.com" target="_blank">gpn.care@gmail.com</a></div>`;

  app.innerHTML=html;
  window._D=data;

  // Draw bar chart
  const bc3=document.getElementById('barChart');
  if(bc3&&tests.length>0){if(barCI){barCI.destroy();barCI=null;}barCI=new Chart(bc3,{type:'bar',data:{labels:tests.map(t=>t.label),datasets:[{data:tests.map(t=>t.p),backgroundColor:tests.map(t=>(t.p??0)>=75?'rgba(105,255,71,0.75)':(t.p??0)>=50?'rgba(255,213,79,0.75)':'rgba(255,82,82,0.75)'),borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#607d8b',font:{size:10}},grid:{color:'rgba(30,58,95,0.5)'}},y:{min:0,max:100,ticks:{color:'#607d8b',font:{size:10},stepSize:5,callback:v=>v+'%'},grid:{color:'rgba(30,58,95,0.5)'}}}}})}

  // Draw line chart
  const lc=document.getElementById('lineChart');
  if(lc&&majors.length>1){if(lineCI){lineCI.destroy();lineCI=null;}lineCI=new Chart(lc,{type:'line',data:{labels:majors.map(t=>t.month),datasets:[{data:majors.map(t=>t.p),borderColor:'#00e5ff',backgroundColor:'rgba(0,229,255,0.07)',pointBackgroundColor:'#ffd54f',pointRadius:5,tension:0.35,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#607d8b',font:{size:10}},grid:{color:'rgba(30,58,95,0.5)'}},y:{min:0,max:100,ticks:{color:'#607d8b',font:{size:10},stepSize:5,callback:v=>v+'%'},grid:{color:'rgba(30,58,95,0.5)'}}}}})}

  sendH();
}

function switchMonth(mk){go(window._D,mk);}
function logout(){sessionStorage.removeItem('gpn_student');window.location.assign('index.html');}
function sendH(){const tb=document.querySelector('.top-bar');if(app&&tb)window.parent.postMessage({type:'gpn-resize',height:app.offsetHeight+tb.offsetHeight+100},'*');}
window.addEventListener('load',sendH);window.addEventListener('resize',sendH);
const obs=new MutationObserver(sendH);if(app)obs.observe(app,{childList:true,subtree:true});
</script>
</body>
</html>
