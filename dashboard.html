<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
  <title>My Dashboard — Guided Path Noida</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a192f;font-family:'DM Sans',sans-serif;color:#c8d8ec;min-height:100vh;padding:0 0 48px;position:relative;}
    body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 15% 25%,rgba(0,229,255,0.11) 0%,transparent 55%),radial-gradient(ellipse at 85% 75%,rgba(255,213,79,0.07) 0%,transparent 50%);animation:bgPulse 10s ease-in-out infinite alternate;pointer-events:none;}
    body::after{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.02) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;}
    @keyframes bgPulse{0%{opacity:.6;}100%{opacity:1;}}

    /* TOP BAR */
    .top-bar{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 0;max-width:720px;margin:0 auto;position:relative;z-index:2;}
    .brand-text .name{font-family:'Rajdhani',sans-serif;font-size:1.25rem;font-weight:700;background:linear-gradient(135deg,#ffd54f,#ffc107);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .brand-text .sub{font-size:.7rem;color:#7a95b0;letter-spacing:.5px;}
    .logout-btn{background:rgba(255,213,79,0.1);border:1px solid rgba(255,213,79,0.5);color:#ffd54f;font-size:.8rem;padding:8px 18px;cursor:pointer;border-radius:10px;font-weight:600;transition:all .2s;-webkit-tap-highlight-color:transparent;}
    .logout-btn:active{background:rgba(255,213,79,0.3);transform:scale(.96);}

    .wrap{position:relative;z-index:2;max-width:720px;margin:0 auto;padding:0 14px;}

    /* WELCOME */
    .welcome-card{background:linear-gradient(135deg,rgba(17,34,64,.85),rgba(0,229,255,0.08));backdrop-filter:blur(12px);border:1px solid rgba(0,229,255,0.35);border-left:3px solid #00e5ff;border-radius:10px;padding:18px 20px;margin-top:12px;}
    .welcome-card h1{font-family:'Rajdhani',sans-serif;font-size:1.45rem;font-weight:700;background:linear-gradient(135deg,#ffffff,#00e5ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .welcome-card p{font-size:.83rem;color:#8aabcc;margin-top:5px;}
    .month-tag{display:inline-block;font-family:'Rajdhani',sans-serif;font-size:.75rem;font-weight:600;color:#00e5ff;letter-spacing:2px;text-transform:uppercase;margin-top:12px;background:rgba(0,229,255,0.08);padding:5px 14px;border-radius:8px;border:1px solid rgba(0,229,255,0.25);}

    /* TABS */
    .dash-tabs{display:flex;gap:4px;margin:14px 0 0;background:rgba(13,27,55,0.7);backdrop-filter:blur(12px);padding:5px;border-radius:12px;border:1px solid rgba(0,229,255,0.15);}
    .dash-tab{flex:1;padding:9px 4px;background:transparent;border:1px solid transparent;color:#5a7a9a;font-family:'Rajdhani',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.3px;text-transform:uppercase;cursor:pointer;border-radius:8px;transition:all .2s;text-align:center;-webkit-tap-highlight-color:transparent;}
    .dash-tab.active{background:rgba(0,229,255,0.12);color:#00e5ff;border-color:rgba(0,229,255,0.3);}
    .dash-section{display:none;padding-top:2px;} .dash-section.active{display:block;}

    /* CARDS */
    .card{background:rgba(17,34,64,0.7);backdrop-filter:blur(12px);border:1px solid rgba(0,229,255,0.22);border-radius:10px;padding:18px;margin-top:14px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.4);}
    .card-title{font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:700;color:#ffd54f;text-transform:uppercase;letter-spacing:2px;margin-bottom:14px;display:flex;align-items:center;gap:8px;}
    .card-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,#1e3a5f,transparent);}

    /* INFO GRID — 2 column on mobile */
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .info-cell{background:rgba(8,18,38,0.5);border:1px solid rgba(30,58,95,0.7);border-radius:8px;padding:10px 12px;}
    .info-cell.full{grid-column:1/-1;}
    .info-label{font-size:.6rem;color:#7a95b0;text-transform:uppercase;letter-spacing:.6px;font-weight:600;margin-bottom:4px;}
    .info-value{font-size:.88rem;font-weight:600;color:#c8d8ec;word-break:break-word;line-height:1.3;}
    /* keep old info-row for fees tab compatibility */
    .info-row{display:flex;align-items:flex-start;padding:11px 0;border-bottom:1px solid rgba(30,58,95,0.6);flex-wrap:wrap;}
    .info-row:last-child{border-bottom:none;padding-bottom:0;}

    /* PERFORMANCE */
    .perf-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
    .perf-box{background:rgba(10,25,47,0.6);border-radius:10px;padding:14px 10px;text-align:center;border:1px solid rgba(0,229,255,0.2);}
    .perf-box.overall{border-color:rgba(255,213,79,0.35);}
    .perf-box.weekly{border-color:rgba(0,229,255,0.3);}
    .perf-box.monthly{border-color:rgba(105,255,71,0.3);}
    .pb-label{font-size:.6rem;color:#7a95b0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
    .pb-val{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:800;line-height:1;margin-top:3px;}
    .perf-box.overall .pb-val{color:#ffd54f;}
    .perf-box.weekly .pb-val{color:#00e5ff;}
    .perf-box.monthly .pb-val{color:#69ff47;}
    .pb-sub{font-size:.58rem;color:#5a7a9a;margin-top:4px;}
    .rank-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px;}
    .rank-big{font-family:'Rajdhani',sans-serif;font-size:2.4rem;font-weight:800;color:#00e5ff;text-shadow:0 0 12px rgba(0,229,255,0.4);}
    .rank-label{font-size:.72rem;color:#7a95b0;text-transform:uppercase;letter-spacing:.5px;}

    /* BADGES */
    .badges-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
    .badge-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:40px;font-size:.75rem;font-weight:700;}
    .badge-chip.Elite{background:rgba(105,255,71,0.12);border:1px solid #69ff47;color:#69ff47;}
    .badge-chip.OnFire,.badge-chip.on-fire{background:rgba(255,82,82,0.12);border:1px solid #ff5252;color:#ff8a80;}
    .badge-chip.Consistent{background:rgba(0,229,255,0.12);border:1px solid #00e5ff;color:#00e5ff;}
    .badge-chip.Striker{background:rgba(0,229,255,0.12);border:1px solid #00e5ff;color:#00e5ff;}
    .badge-chip.Legend{background:rgba(255,213,79,0.12);border:1px solid #ffd54f;color:#ffd54f;}
    .badge-chip.Rocket{background:rgba(255,183,77,0.12);border:1px solid #ffb74d;color:#ffb74d;}

    /* LEADERBOARD BTN */
    .lb-btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,rgba(255,213,79,0.12),rgba(255,179,71,0.08));border:1px solid #ffd54f;border-radius:10px;padding:10px 20px;margin-top:14px;color:#ffd54f;font-weight:700;font-size:.85rem;text-decoration:none;transition:all .2s;-webkit-tap-highlight-color:transparent;}
    .lb-btn:active{transform:scale(.97);}

    /* ATTENDANCE */
    .att-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid rgba(30,58,95,0.4);}
    .att-month{font-size:.85rem;font-weight:500;min-width:90px;flex-shrink:0;}
    .att-bar{flex:1;margin:0 12px;}
    .att-bar-bg{height:8px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;}
    .att-bar-fill{height:100%;border-radius:10px;transition:width 1s ease;}
    .att-bar-fill.good{background:linear-gradient(90deg,#69ff47,#2ecc71);}
    .att-bar-fill.warn{background:linear-gradient(90deg,#ffd54f,#f39c12);}
    .att-bar-fill.bad{background:linear-gradient(90deg,#ff5252,#e74c3c);}
    .att-pct{font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;color:#ffd54f;min-width:60px;text-align:right;}
    .att-overall{margin-top:14px;padding:12px 16px;background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.2);border-radius:10px;display:flex;justify-content:space-between;align-items:center;}
    .att-overall-label{font-size:.75rem;color:#7a95b0;text-transform:uppercase;letter-spacing:.5px;}
    .att-overall-val{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;color:#00e5ff;}

    /* FEES */
    .fees-hero{border-radius:10px;padding:16px 18px;margin-bottom:14px;border:1px solid rgba(0,229,255,0.3);}
    .fees-hero.paid{border-color:#69ff47;background:rgba(105,255,71,0.05);}
    .fees-hero.due{border-color:#ffd54f;background:rgba(255,213,79,0.05);}
    .fees-hero.late{border-color:#ff5252;background:rgba(255,82,82,0.07);}
    .fh-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
    .fh-icon{font-size:1.8rem;}
    .fh-body{flex:1;}
    .fh-status{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:800;}
    .fees-hero.paid .fh-status{color:#69ff47;} .fees-hero.due .fh-status{color:#ffd54f;} .fees-hero.late .fh-status{color:#ff8a80;}
    .fh-sub{font-size:.75rem;color:#8aabcc;margin-top:2px;}
    .fh-amount{font-family:'Rajdhani',sans-serif;font-size:1.5rem;font-weight:800;}
    .fees-hero.paid .fh-amount{color:#69ff47;} .fees-hero.due .fh-amount{color:#ffd54f;} .fees-hero.late .fh-amount{color:#ff8a80;}
    .late-countdown{display:inline-block;margin-top:6px;padding:4px 12px;background:rgba(255,82,82,0.15);border:1px solid rgba(255,82,82,0.4);border-radius:8px;font-size:.75rem;color:#ff8a80;font-weight:600;}
    .pay-btn{display:block;width:100%;text-align:center;background:linear-gradient(135deg,rgba(255,213,79,0.12),rgba(255,179,71,0.08));border:1px solid #ffd54f;border-radius:10px;padding:12px;margin-top:12px;color:#ffd54f;font-weight:700;text-decoration:none;font-size:.9rem;transition:all .2s;-webkit-tap-highlight-color:transparent;}
    .pay-btn:active{transform:scale(.97);}
    .cycles-label{font-size:.7rem;color:#7a95b0;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px;}
    .cycle-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid rgba(30,58,95,0.4);}
    .cycle-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .cycle-dot.paid{background:#69ff47;box-shadow:0 0 8px #69ff47;}
    .cycle-dot.due{background:#ffd54f;}
    .cycle-dot.late{background:#ff5252;box-shadow:0 0 6px #ff5252;}
    .cycle-body{flex:1;}
    .cycle-lbl{font-size:.85rem;font-weight:700;color:#c8d8ec;}
    .cycle-dates{font-size:.7rem;color:#7a95b0;}
    .cycle-dl{font-size:.7rem;margin-top:2px;}
    .cycle-dl.unpaid{color:#ff5252;} .cycle-dl.okpaid{color:#69ff47;}
    .cycle-right{text-align:right;flex-shrink:0;}
    .cycle-amt{font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;color:#ffd54f;}
    .cycle-badge{display:inline-block;margin-top:4px;padding:2px 10px;border-radius:20px;font-size:.65rem;font-weight:700;}
    .cycle-badge.paid{background:rgba(105,255,71,0.12);color:#69ff47;border:1px solid #69ff47;}
    .cycle-badge.due{background:rgba(255,213,79,0.12);color:#ffd54f;border:1px solid #ffd54f;}
    .cycle-badge.late{background:rgba(255,82,82,0.12);color:#ff8a80;border:1px solid #ff5252;}
    .outstanding-strip{margin-top:14px;padding:13px 16px;background:linear-gradient(135deg,rgba(255,82,82,0.12),rgba(231,76,60,0.06));border-radius:10px;display:flex;justify-content:space-between;align-items:center;border:1px solid #ff5252;}
    .os-label{font-size:.75rem;color:#8aabcc;}
    .os-amount{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:800;color:#ff8a80;}

    /* TESTS */
    .test-item{margin-bottom:12px;}
    .test-name{font-size:.82rem;color:#8aabcc;margin-bottom:5px;}
    .test-score-row{display:flex;align-items:center;gap:12px;}
    .test-score{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:800;color:#ffd54f;flex-shrink:0;min-width:55px;}
    .progress-wrap{flex:1;}
    .progress-bg{height:8px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;}
    .progress-fill{height:100%;border-radius:10px;transition:width .8s ease;}
    .progress-fill.good{background:linear-gradient(90deg,#69ff47,#2ecc71);}
    .progress-fill.warn{background:linear-gradient(90deg,#ffd54f,#f39c12);}
    .progress-fill.bad{background:linear-gradient(90deg,#ff5252,#e74c3c);}
    .score-badge{padding:4px 11px;border-radius:40px;font-size:.72rem;font-weight:700;flex-shrink:0;}
    .score-badge.good{background:rgba(105,255,71,0.12);color:#69ff47;border:1px solid #69ff47;}
    .score-badge.warn{background:rgba(255,213,79,0.12);color:#ffd54f;border:1px solid #ffd54f;}
    .score-badge.bad{background:rgba(255,82,82,0.12);color:#ff8a80;border:1px solid #ff5252;}
    .avg-strip{display:flex;justify-content:space-between;margin-top:14px;padding-top:12px;border-top:1px solid rgba(30,58,95,0.5);font-size:.85rem;}
    .avg-strip .lbl{color:#7a95b0;} .avg-strip .val{color:#ffd54f;font-weight:700;}
    .chart-wrap{position:relative;height:200px;margin-top:12px;}
    .major-item{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid rgba(30,58,95,0.4);}
    .major-month{font-size:.85rem;min-width:80px;color:#8aabcc;flex-shrink:0;}
    .major-bar{flex:1;margin:0 12px;}
    .major-bar-bg{height:8px;background:rgba(255,255,255,0.08);border-radius:10px;overflow:hidden;}
    .major-bar-fill{height:100%;background:linear-gradient(90deg,#00e5ff,#00b4d8);border-radius:10px;transition:width 1s ease;}
    .major-score{font-family:'Rajdhani',sans-serif;font-size:.9rem;font-weight:700;color:#ffd54f;min-width:45px;text-align:right;}
    .month-select{background:#0a192f;border:1px solid #1e3a5f;border-radius:10px;padding:8px 12px;color:#c8d8ec;font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;cursor:pointer;}

    /* REMARK */
    .remark-box{background:rgba(255,213,79,0.05);border-radius:10px;padding:14px 16px;border-left:3px solid #ffd54f;font-size:.85rem;line-height:1.6;color:#c8d8ec;}

    /* FILES */
    .files-list{display:flex;flex-direction:column;gap:8px;}
    .file-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(8,18,38,0.55);border:1px solid rgba(30,58,95,.7);border-radius:10px;text-decoration:none;transition:border-color .2s;-webkit-tap-highlight-color:transparent;}
    .file-item:active{border-color:rgba(0,229,255,.5);}
    .file-item.unseen{border-color:rgba(255,82,82,.4);}
    .file-item.seen{border-color:rgba(105,255,71,.2);}
    .fi-icon{font-size:1.2rem;flex-shrink:0;}
    .fi-info{flex:1;min-width:0;}
    .fi-name{font-size:.85rem;color:#c8d8ec;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .fi-date{font-size:.68rem;color:#5a7a9a;margin-top:2px;}
    .fi-seen{font-size:.68rem;padding:2px 8px;border-radius:6px;flex-shrink:0;}
    .fi-seen.seen{background:rgba(105,255,71,0.1);color:#69ff47;border:1px solid rgba(105,255,71,.3);}
    .fi-seen.unseen{background:rgba(255,82,82,0.1);color:#ff8a80;border:1px solid rgba(255,82,82,.3);}
    .show-more-btn{width:100%;padding:10px;background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.2);border-radius:8px;color:#00e5ff;font-size:.8rem;font-weight:600;cursor:pointer;margin-top:4px;-webkit-tap-highlight-color:transparent;}
    .show-more-btn:active{background:rgba(0,229,255,0.12);}

    /* BATCHES */
    .batch-item{background:rgba(8,18,38,0.55);border:1px solid rgba(0,229,255,0.2);border-radius:10px;padding:13px 14px;margin-bottom:10px;}
    .batch-name{font-family:'Rajdhani',sans-serif;font-size:.92rem;font-weight:700;color:#00e5ff;margin-bottom:6px;}
    .batch-detail{font-size:.78rem;color:#7a95b0;line-height:1.7;}
    .batch-detail span{color:#c8d8ec;font-weight:600;}

    .empty{text-align:center;padding:24px;color:#7a95b0;font-size:.83rem;}
    .dash-footer{text-align:center;font-size:.7rem;color:#7a95b0;margin-top:28px;padding-bottom:20px;}
    .dash-footer a{color:#ffd54f;text-decoration:none;}
    @media(max-width:540px){
      .wrap{padding:0 12px;}
      .card{padding:15px;}
      .perf-grid{grid-template-columns:1fr 1fr;}
      .perf-grid .perf-box:nth-child(3){grid-column:1/-1;}
    }
  </style>
</head>
<body>
<div class="top-bar">
  <div class="brand-text">
    <div class="name">Guided Path Noida</div>
    <div class="sub">Student Performance Portal</div>
  </div>
  <button class="logout-btn" onclick="logout()">Logout</button>
</div>
<div class="wrap" id="app"></div>

<script>
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbzO3sf2bgSstGAlpnGAEIGPkcTR7ulIWJDVxavY-uK-QUA7U12c7My4CYV3Yvn5kF4S/exec";

// Month arrays
var SESSION_MONTHS=[
  {key:"Apr",label:"April"},{key:"May",label:"May"},{key:"Jun",label:"June"},
  {key:"Jul",label:"July"},{key:"Aug",label:"August"},{key:"Sep",label:"September"},
  {key:"Oct",label:"October"},{key:"Nov",label:"November"},{key:"Dec",label:"December"},
  {key:"Jan",label:"January"},{key:"Feb",label:"February"},{key:"Mar",label:"March"}
];
var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function curMK(){return MO[new Date().getMonth()];}
function nowMonthLabel(){return new Date().toLocaleString('en-IN',{month:'long',year:'numeric'});}

var app=document.getElementById('app');
var barCI=null,lineCI=null;
var _D=null; // global data store
var _selMK=curMK();
var _activeTab='info';

// ── SESSION CHECK ──
var raw=sessionStorage.getItem('gpn_student');
var _studentToken=sessionStorage.getItem('gpn_student_token')||'';
if(!raw){
  app.innerHTML='<div style="text-align:center;padding:40px;"><h2 style="color:#ffd54f;">Session Expired</h2><p style="margin:12px 0;color:#7a95b0;">Please log in again.</p><a href="index.html" style="color:#ffd54f;">← Back to Login</a></div>';
} else {
  _D=JSON.parse(raw);
  render(_D,_selMK,'info');
}

// ── UTILS ──
function gv(d,k){var v=d[k];return(v==null||String(v).trim()==='')?null:String(v).trim();}
function esc(s){return s?String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'):'—';}
function fmtDate(v){
  if(!v&&v!==0)return'—';var s=String(v).trim();if(!s)return'—';
  if(/^\d{4}-\d{2}-\d{2}/.test(s)){var p=s.split('-');return parseInt(p[2])+' '+MO[parseInt(p[1])-1]+' '+p[0];}
  if(/^\d{1,2} [A-Za-z]{3} \d{4}/.test(s))return s;
  var n=parseFloat(s);if(!isNaN(n)&&n>40000){var d=new Date(Math.round((n-25569)*86400*1000));return d.getDate()+' '+MO[d.getMonth()]+' '+d.getFullYear();}
  return s;
}
function parseDd(s){
  if(!s)return null;s=String(s).trim();
  var moMap={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  if(/^\d{4}-\d{2}-\d{2}/.test(s)){var p=s.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
  var m=s.match(/^(\d{1,2}) ([A-Za-z]{3}) (\d{4})/);
  if(m&&moMap[m[2]]!==undefined)return new Date(parseInt(m[3]),moMap[m[2]],parseInt(m[1]));
  return null;
}
function pct(p){return p===null?'warn':p>=75?'good':p>=50?'warn':'bad';}
function bc(p){return pct(p);}

// ── TESTS HELPERS — reads raw _tests array from pipeline ──
function getTestsByType(tests,type,mk){
  if(!tests||!tests.length)return[];
  var year=(mk==='Jan'||mk==='Feb'||mk==='Mar')?2027:2026;
  var monthIndex=new Date(mk+' 1 '+year).getMonth();
  return tests.filter(function(t){
    return t.type===type&&t.dateObj&&new Date(t.dateObj).getMonth()===monthIndex&&new Date(t.dateObj).getFullYear()===year;
  });
}

// ── CLEAN TIME helper — strips garbage Date object strings, keeps plain times like "3:00 PM" ──
function cleanTime(t){
  if(!t)return'';
  var s=String(t).trim();
  // Garbage detection: full date strings contain 4-digit year or timezone keywords
  if(s.match(/\d{4}|GMT|UTC|IST/))return'';
  return s;
}

// ── FEES TAB ──
function buildFeesTab(data){
  var cycles=data['_fees']||[];
  var totalDue=parseFloat(data['_totalDue']||0);
  var today=new Date();today.setHours(0,0,0,0);

  // Find current cycle
  var currentCycle=null;
  for(var i=0;i<cycles.length;i++){
    var c=cycles[i];
    var cs=parseDd(c.cycleStart),ce=parseDd(c.cycleEnd);
    if(cs&&ce&&today>=cs&&today<=ce){currentCycle=c;break;}
  }
  if(!currentCycle){
    var active=cycles.filter(function(c){return c.status!=='Not Started';});
    if(active.length)currentCycle=active[active.length-1];
  }

  var status=currentCycle?currentCycle.status:'Not Started';
  var stCls=status==='Paid'?'paid':status==='Late'?'late':'due';
  var icon,label,sub;
  if(status==='Paid'){icon='✅';label='Fees Paid';sub=currentCycle?('Paid: '+fmtDate(currentCycle.paymentDate)+' · '+esc(currentCycle.cycleLabel)):'All clear!';}
  else if(status==='Late'){icon='⚠️';label='Payment Overdue';sub=currentCycle?('Deadline was '+fmtDate(currentCycle.deadline)):'';}
  else if(status==='Not Started'){icon='🕐';label='Not Started Yet';sub='Billing not begun yet.';}
  else{icon='⏳';label='Fees Due';sub=currentCycle?('Pay by '+fmtDate(currentCycle.deadline)+' to avoid Late'):'';}

  var amtVal=totalDue>0?totalDue:(currentCycle?currentCycle.feeAmount:0);

  var html='<div class="card"><div class="card-title">💰 Fees Status</div>';
  html+='<div class="fees-hero '+stCls+'"><div class="fh-row">'+
    '<div class="fh-icon">'+icon+'</div>'+
    '<div class="fh-body"><div class="fh-status">'+label+'</div><div class="fh-sub">'+esc(sub)+'</div></div>'+
    (status!=='Not Started'&&amtVal>0?'<div class="fh-amount">₹'+amtVal+'</div>':'')+
  '</div>';

  // Late countdown
  if(status==='Late'&&currentCycle&&currentCycle.daysLate>0){
    html+='<div style="margin-top:8px;"><span class="late-countdown">⏱ Late by '+currentCycle.daysLate+' day'+(currentCycle.daysLate>1?'s':'')+'</span></div>';
  }
  html+='</div>';

  if(status==='Due'||status==='Late'){
    html+='<a class="pay-btn" href="https://www.guidedpathnoida.in/fees" target="_blank">💳 Pay Fees Now</a>';
  }

  // Cycle history
  var visible=cycles.filter(function(c){return c.status!=='Not Started';});
  if(visible.length){
    html+='<div class="cycles-label">Fee History</div>';
    visible.forEach(function(c){
      var stc=c.status==='Paid'?'paid':c.status==='Late'?'late':'due';
      var dlHtml='';
      if(c.status==='Paid'&&c.paymentDate)dlHtml='<div class="cycle-dl okpaid">✓ Paid: '+fmtDate(c.paymentDate)+'</div>';
      else if(c.status!=='Paid'){
        var dlTxt='Pay by: '+fmtDate(c.deadline);
        if(c.daysLate>0)dlTxt+=' (Late by '+c.daysLate+'d)';
        dlHtml='<div class="cycle-dl unpaid">'+dlTxt+'</div>';
      }
      html+='<div class="cycle-item">'+
        '<div class="cycle-dot '+stc+'"></div>'+
        '<div class="cycle-body"><div class="cycle-lbl">'+esc(c.cycleLabel)+'</div>'+
        '<div class="cycle-dates">'+fmtDate(c.cycleStart)+' → '+fmtDate(c.cycleEnd)+'</div>'+dlHtml+'</div>'+
        '<div class="cycle-right"><div class="cycle-amt">₹'+(c.feeAmount||0)+'</div>'+
        '<div><span class="cycle-badge '+stc+'">'+esc(c.status)+'</span></div></div>'+
      '</div>';
    });
  }

  if(totalDue>0){
    html+='<div class="outstanding-strip"><div class="os-label">Total Outstanding</div><div class="os-amount">₹'+totalDue+'</div></div>';
  }

  html+='</div>';
  return html;
}

// ── ACADEMIC TAB ──
function renderAcademic(data,selMK){
  var inner=document.getElementById('academic-inner');
  if(!inner)return;
  if(barCI){try{barCI.destroy();}catch(e){}barCI=null;}
  if(lineCI){try{lineCI.destroy();}catch(e){}lineCI=null;}

  var tests=data['_tests']||[];
  var rank=gv(data,'Rank');
  var badges=gv(data,'Badges')||'';
  var remark=gv(data,'Remarks');
  var badgeList=badges?badges.split(',').map(function(b){return b.trim();}).filter(Boolean):[];

  // ── RECALCULATE PERFORMANCE CORRECTLY ──
  var now=new Date(); now.setHours(0,0,0,0);

  // Weekly avg — this week's MINOR tests only
  var weekStart=new Date(now);
  var day=now.getDay()||7; weekStart.setDate(now.getDate()-day+1);
  var weekEnd=new Date(weekStart); weekEnd.setDate(weekStart.getDate()+6);
  var weeklyTests=tests.filter(function(t){
    if(t.type!=='minor')return false;
    var d=new Date(t.dateObj); d.setHours(0,0,0,0);
    return d>=weekStart&&d<=weekEnd;
  });
  var weeklyAvg=weeklyTests.length?weeklyTests.reduce(function(s,t){return s+t.marks;},0)/weeklyTests.length:null;

  // Monthly avg — this month's MAJOR test only
  var majorTests=tests.filter(function(t){return t.type==='major';});
  var thisMonthMajor=majorTests.filter(function(t){
    var d=new Date(t.dateObj);
    return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
  });
  var monthlyAvg=thisMonthMajor.length?thisMonthMajor.reduce(function(s,t){return s+t.marks;},0)/thisMonthMajor.length:null;

  // Overall avg — ALL tests (minor + major) cumulative
  var overallAvg=tests.length?tests.reduce(function(s,t){return s+t.marks;},0)/tests.length:null;

  var html='';

  html+='<div class="perf-grid">';

  html+='<div class="perf-box weekly"><div class="pb-label">This Week</div><div class="pb-val">'+(weeklyAvg!==null?weeklyAvg.toFixed(1)+'%':'—')+'</div><div class="pb-sub">'+(weeklyAvg!==null?'Minor tests':'No minor test')+'</div></div>';
  html+='<div class="perf-box monthly"><div class="pb-label">This Month</div><div class="pb-val">'+(monthlyAvg!==null?monthlyAvg.toFixed(1)+'%':'—')+'</div><div class="pb-sub">'+(monthlyAvg!==null?'Major test':'No major test')+'</div></div>';
  html+='</div>';
  if(badgeList.length){
    html+='<div class="badges-wrap">'+badgeList.map(function(b){
      var key=b.replace(/\s+/g,'');
      return '<span class="badge-chip '+key+'">'+esc(b)+'</span>';

  }
  html+='<div style="text-align:center;"><a class="lb-btn" href="https://www.guidedpathnoida.in/p/offline-students-ranking-leaderboard.html" target="_blank">🏆 View Full Leaderboard →</a></div>';
  html+='</div>';

  // Minor tests — month selector
  var mOpts=SESSION_MONTHS.filter(function(m){

      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{ticks:{color:'#7a95b0',font:{size:10}},grid:{color:'rgba(30,58,95,0.5)'}},
          y:{min:0,max:100,ticks:{color:'#7a95b0',font:{size:10},stepSize:25,callback:function(v){return v+'%';}},grid:{color:'rgba(30,58,95,0.5)'}}}}});
  }

  setTimeout(sendH,300);
}

// ── ATTENDANCE TAB — rendered inside Info, actually it's its own section now ──
// Attendance is shown in a separate card within Info tab — wait, doc says separate tab
// Actually per the doc: Info | Fees | Academic(was Attendance+Academic) | Files
// Re-reading doc: Info | Attendance | Academic | Files
// But we already set tabs as: Info | Fees | Academic | Files
// Attendance goes in Academic section per the design balance, OR we add 5th tab
// Since doc says 4 tabs Info|Attendance|Academic|Files, let's put fees inside info
// and attendance as proper tab. Let's rebuild properly inline.

// ── FILES TAB ──
var _filesShowCount=10;
var _filesData=[];
var _viewedSet={};

function renderFiles(data){
  var inner=document.getElementById('files-inner');
  if(!inner)return;
  _filesData=data['_files']||[];
  var cls=gv(data,'Class')||'';
  var sid=gv(data,'StudentID')||'';

  // Build initial viewed set from data
  _viewedSet={};
  _filesData.forEach(function(f){if(f.viewed)_viewedSet[f.fileId]=true;});

  _filesShowCount=10;
  renderFilesList(cls,sid);
}

function renderFilesList(cls,sid){
  var inner=document.getElementById('files-inner');
  if(!inner)return;
  cls=cls||_filesData[0]&&'';
  sid=sid||'';

  var html='<div class="card"><div class="card-title">📁 Study Files'+(cls?' — '+esc(cls):'')+'</div>';
  if(!_filesData.length){
    html+='<div class="empty">No files uploaded for your class yet.<br>Check back soon!</div>';
  } else {
    var visible=_filesData.slice(0,_filesShowCount);
    var remaining=_filesData.length-_filesShowCount;
    html+='<div class="files-list" id="filesList">';
    visible.forEach(function(f){
      var seen=_viewedSet[f.fileId]||false;
      var fid=String(f.fileId||'').replace(/'/g,"\\'");
      var sidE=String(sid||'').replace(/'/g,"\\'");
      html+='<a class="file-item '+(seen?'seen':'unseen')+'" id="fi_'+esc(f.fileId)+'" href="'+esc(f.driveUrl)+'" target="_blank" onclick="markViewed(\''+fid+'\',\''+sidE+'\')">'+
        '<div class="fi-icon">'+(seen?'📄':'🆕')+'</div>'+
        '<div class="fi-info"><div class="fi-name">'+esc(f.fileName)+'</div>'+
        (f.uploadDate?'<div class="fi-date">Uploaded: '+esc(f.uploadDate)+'</div>':'')+
        '</div>'+
        '<span class="fi-seen '+(seen?'seen':'unseen')+'" id="fis_'+esc(f.fileId)+'">'+(seen?'✓ Seen':'New')+'</span>'+
      '</a>';
    });
    html+='</div>';
    if(remaining>0){
      html+='<button class="show-more-btn" onclick="showMoreFiles()">Show '+Math.min(remaining,10)+' more ('+remaining+' remaining)</button>';
    }
    html+='<div style="font-size:.68rem;color:#5a7a9a;text-align:center;margin-top:8px;">'+_filesData.length+' file'+(  _filesData.length!==1?'s':'')+' total</div>';
  }
  html+='</div>';
  inner.innerHTML=html;

  // Store sid for show more
  inner.dataset.sid=sid;
  inner.dataset.cls=cls;
  sendH();
}

function showMoreFiles(){
  _filesShowCount+=10;
  var inner=document.getElementById('files-inner');
  renderFilesList(inner?inner.dataset.cls:'',inner?inner.dataset.sid:'');
}

function markViewed(fileId,studentId){
  if(!fileId||!studentId)return;
  if(_viewedSet[fileId])return; // already marked, skip API call
  // Update locally immediately
  _viewedSet[fileId]=true;
  var el=document.getElementById('fi_'+fileId);
  var badge=document.getElementById('fis_'+fileId);
  if(el){el.classList.remove('unseen');el.classList.add('seen');var icon=el.querySelector('.fi-icon');if(icon)icon.textContent='📄';}
  if(badge){badge.className='fi-seen seen';badge.textContent='✓ Seen';}
  // Fire and forget to backend
  fetch(APPS_SCRIPT_URL,{method:'POST',body:JSON.stringify({action:'markFileViewed',fileId:fileId,studentId:studentId})}).catch(function(){});
}

// ── HEIGHT ──
function sendH(){
  var tb=document.querySelector('.top-bar');
  if(app&&tb)window.parent.postMessage({type:'gpn-resize',height:app.offsetHeight+tb.offsetHeight+80},'*');
}
function logout(){
  sessionStorage.removeItem('gpn_student');
  sessionStorage.removeItem('gpn_student_token');
  window.location.assign('index.html');
}
window.addEventListener('load',sendH);
window.addEventListener('resize',sendH);
var obs=new MutationObserver(sendH);if(app)obs.observe(app,{childList:true,subtree:true});
</script>
