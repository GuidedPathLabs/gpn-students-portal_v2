<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
  <title>GPN Student Portal — Guided Path Noida</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a192f;font-family:'DM Sans',sans-serif;color:#c0c0c0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px 16px;position:relative;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 15% 25%,rgba(0,229,255,0.13) 0%,transparent 55%),radial-gradient(ellipse at 85% 75%,rgba(255,213,79,0.09) 0%,transparent 50%);animation:ambientPulse 10s ease-in-out infinite alternate;pointer-events:none;}
    @keyframes ambientPulse{0%{opacity:.7;}100%{opacity:1;}}
    body::after{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;}
    .card{position:relative;z-index:1;background:rgba(13,27,55,0.75);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);border:1px solid rgba(0,229,255,0.2);border-radius:16px;padding:36px 28px;width:100%;max-width:420px;box-shadow:0 20px 60px -15px rgba(0,0,0,0.6),0 1px 0 rgba(255,255,255,0.07) inset;animation:rise .5s cubic-bezier(.22,.61,.36,1) both;}
    @keyframes rise{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
    .logo-wrap{text-align:center;margin-bottom:24px;}
    .logo-wrap img{height:56px;width:auto;display:none;margin:0 auto 12px;}
    .logo-wrap img.loaded{display:block;}
    .brand-name{font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700;letter-spacing:1px;background:linear-gradient(135deg,#00e5ff 0%,#67f0ff 50%,#00b4d8 100%);-webkit-background-clip:text;background-clip:text;color:transparent;line-height:1.1;}
    .brand-tag{font-size:.72rem;color:#5a7a9a;margin-top:6px;letter-spacing:.3px;}
    .divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,229,255,0.25),transparent);margin:20px 0 24px;}
    .portal-label{font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:600;color:#ffd54f;text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;opacity:.9;}
    .field{margin-bottom:16px;}
    label{display:block;font-size:.7rem;color:#7a95b0;letter-spacing:.6px;text-transform:uppercase;margin-bottom:7px;}
    input{width:100%;background:rgba(8,18,38,0.7);border:1px solid rgba(30,58,95,0.8);border-radius:8px;padding:13px 16px;font-family:'DM Sans',sans-serif;font-size:.95rem;color:#e0eaf5;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
    input:focus{border-color:rgba(0,229,255,0.6);box-shadow:0 0 0 3px rgba(0,229,255,0.08);}
    input::placeholder{color:#3a5a7a;}
    .btn-login{width:100%;margin-top:8px;padding:14px;background:transparent;border:1px solid rgba(255,213,79,0.6);border-radius:8px;color:#ffd54f;font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;}
    .btn-login:active{transform:scale(.98);border-color:#ffd54f;background:rgba(255,213,79,0.08);}
    .msg{font-size:.83rem;margin-top:14px;text-align:center;padding:10px 14px;border-radius:8px;display:none;line-height:1.5;}
    .msg.error{display:block;color:#ff8a80;background:rgba(255,82,82,0.08);border:1px solid rgba(255,82,82,0.25);}
    .msg.loading{display:block;color:#00e5ff;background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.15);}
    .spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(0,229,255,0.2);border-top-color:#00e5ff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .footer-note{text-align:center;font-size:.73rem;color:#4a6a8a;margin-top:22px;line-height:1.9;}
    .footer-note a{color:#ffd54f;text-decoration:none;opacity:.8;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg7b04OQ83kS-lsds5QWi2b9XX0_FiMNMRUK7IGgC5vMEUjIX9HBxTc6HIzjNjj99MNGv83pS1_mMTIEa53AqTELuU5W3OJ3871USQCrDLqyESq08qQCeC7TtZ5klV9VNG5OPM9UM8sSWQLXTur9kpw15GI60PdnP8W1CeJsyhlqKtTx_nvOSkxaFwGxw_1/s1024/1000160208.png" alt="GPN" id="logoImg"/>
    <div class="brand-name">Guided Path Noida</div>
    <div class="brand-tag">आसान पढ़ाई &nbsp;·&nbsp; मजबूत तैयारी &nbsp;·&nbsp; बेहतर परिणाम</div>
  </div>
  <div class="divider"></div>
  <div class="portal-label">🎓 Student Portal</div>
  <div class="field">
    <label for="userId">Student / Admin ID</label>
    <input type="text" id="userId" placeholder="Enter your ID" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="none"/>
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password"/>
  </div>
  <button class="btn-login" onclick="doLogin()">Login &rarr;</button>
  <div class="msg" id="msgBox"></div>
  <div class="footer-note">Trouble? <a href="mailto:gpn.care@gmail.com">gpn.care@gmail.com</a></div>
</div>
<script>
const APPS_SCRIPT_URL="https://script.google.com/macros/s/AKfycbzO3sf2bgSstGAlpnGAEIGPkcTR7ulIWJDVxavY-uK-QUA7U12c7My4CYV3Yvn5kF4S/exec";
const logoImg=document.getElementById('logoImg');
if(logoImg)logoImg.addEventListener('load',function(){logoImg.classList.add('loaded');});
document.addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
function showMsg(t,type){var b=document.getElementById('msgBox');b.className='msg '+type;b.innerHTML=type==='loading'?'<span class="spinner"></span>'+t:t;}
async function doLogin(){
  var id=document.getElementById('userId').value.trim();
  var pw=document.getElementById('password').value.trim();
  if(!id||!pw){showMsg('Please enter both ID and Password.','error');return;}
  showMsg('Verifying credentials…','loading');
  try{
    var res=await fetch(APPS_SCRIPT_URL+'?action=login&id='+encodeURIComponent(id)+'&password='+encodeURIComponent(pw));
    var j=await res.json();
    if(j.status==='success'){
      if(j.role==='admin'){
        sessionStorage.setItem('gpn_admin',JSON.stringify(j.admin));
        sessionStorage.setItem('gpn_token',j.token);
        window.location.assign('admin.html');
      } else {
        sessionStorage.setItem('gpn_student',JSON.stringify(j.student));
        sessionStorage.setItem('gpn_student_token',j.token||'');
        window.location.assign('dashboard.html');
      }
    }else{showMsg(j.message||'Invalid ID or Password.','error');}
  }catch(e){showMsg('Could not connect. Please try again.','error');}
}
// iframe height reporting
function sendHeight(){
  var h=document.body.scrollHeight;
  window.parent.postMessage({type:'gpn-resize',height:h},'*');
}
window.addEventListener('load',sendHeight);
window.addEventListener('resize',sendHeight);
</script>
</body>
</html>
