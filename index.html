<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Portal — Guided Path Noida</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a192f;--surface:#112240;--border:#1e3a5f;--text:#c0c0c0;--heading:#00e5ff;--link:#ffd54f;--error:#ff5252;--muted:#607d8b;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px 16px;}
    body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
    .card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.4);animation:fadeUp 0.4s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
    .logo-wrap{text-align:center;margin-bottom:24px;}
    .logo-wrap img{height:60px;width:auto;display:none;margin:0 auto 12px;}
    .logo-wrap img.loaded{display:block;}
    .brand-name{font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700;color:var(--heading);line-height:1.1;}
    .brand-tag{font-size:0.75rem;color:var(--muted);margin-top:5px;}
    .divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:20px 0 24px;}
    .portal-title{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:600;color:var(--link);text-align:center;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:24px;}
    .field{margin-bottom:16px;}
    label{display:block;font-size:0.75rem;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:7px;}
    input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px 16px;font-family:'DM Sans',sans-serif;font-size:1rem;color:var(--text);outline:none;transition:border-color 0.2s,box-shadow 0.2s;-webkit-appearance:none;}
    input:focus{border-color:var(--heading);box-shadow:0 0 0 3px rgba(0,229,255,0.08);}
    input::placeholder{color:var(--muted);}
    .btn{width:100%;margin-top:8px;padding:15px;background:transparent;border:1.5px solid var(--link);border-radius:10px;color:var(--link);font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:background 0.2s,color 0.2s;-webkit-tap-highlight-color:transparent;}
    .btn:active{background:var(--link);color:var(--bg);}
    .msg{font-size:0.85rem;margin-top:14px;text-align:center;padding:10px 14px;border-radius:8px;display:none;line-height:1.5;}
    .msg.error{display:block;color:var(--error);background:rgba(255,82,82,0.08);border:1px solid rgba(255,82,82,0.2);}
    .msg.loading{display:block;color:var(--heading);background:rgba(0,229,255,0.06);border:1px solid rgba(0,229,255,0.12);}
    .spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,229,255,0.2);border-top-color:var(--heading);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .footer-note{text-align:center;font-size:0.78rem;color:var(--muted);margin-top:24px;line-height:1.8;}
    .footer-note a{color:var(--link);text-decoration:none;font-weight:500;}
  </style>
</head>
<body>
<div class="card">
  <div class="logo-wrap">
    <img src="YOUR_LOGO_URL_HERE" alt="Guided Path Noida" id="logoImg"/>
    <div class="brand-name">Guided Path Noida</div>
    <div class="brand-tag">आसान पढ़ाई · मजबूत तैयारी · बेहतर परिणाम</div>
  </div>
  <div class="divider"></div>
  <div class="portal-title">🎓 GPN Portal</div>
  <div class="field">
    <label for="userId">ID</label>
    <input type="text" id="userId" placeholder="Student ID or Admin ID" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="none"/>
  </div>
  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password"/>
  </div>
  <button class="btn" onclick="doLogin()">Login →</button>
  <div class="msg" id="msgBox"></div>
  <div class="footer-note">Having trouble?<br/><a href="mailto:gpn.care@gmail.com" target="_blank">gpn.care@gmail.com</a></div>
</div>
<script>
  const APPS_SCRIPT_URL = "YOUR_APPS_SCRIPT_URL_HERE";
  const logoImg = document.getElementById('logoImg');
  if (logoImg && !logoImg.src.includes('YOUR_LOGO_URL_HERE')) logoImg.classList.add('loaded');
  document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  function showMsg(text, type) {
    const box = document.getElementById('msgBox');
    box.className = 'msg ' + type;
    box.innerHTML = type === 'loading' ? `<span class="spinner"></span>${text}` : text;
  }

  async function doLogin() {
    const id  = document.getElementById('userId').value.trim();
    const pwd = document.getElementById('password').value.trim();
    if (!id || !pwd) { showMsg('Please enter both ID and Password.', 'error'); return; }
    showMsg('Verifying credentials…', 'loading');
    try {
      const url = `${APPS_SCRIPT_URL}?action=login&id=${encodeURIComponent(id)}&password=${encodeURIComponent(pwd)}`;
      const res = await fetch(url);
      const json = await res.json();
      if (json.status === 'success') {
        if (json.role === 'admin') {
          sessionStorage.setItem('gpn_admin', JSON.stringify(json.admin));
          window.location.assign('admin.html');
        } else {
          sessionStorage.setItem('gpn_student', JSON.stringify(json.student));
          window.location.assign('dashboard.html');
        }
      } else {
        showMsg(json.message || 'Invalid ID or Password.', 'error');
      }
    } catch (err) { showMsg('Could not connect. Please try again.', 'error'); }
  }

  function sendHeight() {
    const card = document.querySelector('.card');
    if (card) window.parent.postMessage({ type:'gpn-resize', height: card.offsetHeight + 60 }, '*');
  }
  window.addEventListener('load', sendHeight);
  window.addEventListener('resize', sendHeight);
</script>
</body>
</html>
