<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GPN Student Leaderboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a192f;--surface:#112240;--border:#1e3a5f;--text:#c0c0c0;--heading:#00e5ff;--link:#ffd54f;--muted:#607d8b;--good:#69ff47;--bad:#ff5252;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0 0 48px;}
    body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(0,229,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}
    .wrap{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 16px 32px;}

    /* HEADER */
    .lb-header{text-align:center;padding:32px 16px 24px;position:relative;z-index:1;}
    .lb-header .brand{font-family:'Rajdhani',sans-serif;font-size:1rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
    .lb-header h1{font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;color:var(--heading);margin-top:6px;}
    .lb-header .subtitle{font-size:0.82rem;color:var(--muted);margin-top:6px;}
    .lb-updated{font-size:0.72rem;color:var(--muted);margin-top:4px;}

    /* TOP 3 PODIUM */
    .podium{display:flex;align-items:flex-end;justify-content:center;gap:10px;margin-bottom:28px;}
    .podium-item{flex:1;max-width:200px;text-align:center;cursor:default;}
    .podium-card{border-radius:16px;padding:16px 12px;border:1px solid var(--border);}
    .podium-item.rank1 .podium-card{background:linear-gradient(135deg,rgba(255,213,79,0.15),rgba(255,213,79,0.05));border-color:rgba(255,213,79,0.4);transform:scale(1.06);}
    .podium-item.rank2 .podium-card{background:linear-gradient(135deg,rgba(0,229,255,0.1),rgba(0,229,255,0.03));border-color:rgba(0,229,255,0.25);}
    .podium-item.rank3 .podium-card{background:linear-gradient(135deg,rgba(105,255,71,0.08),rgba(105,255,71,0.02));border-color:rgba(105,255,71,0.2);}
    .podium-crown{font-size:1.6rem;margin-bottom:6px;}
    .podium-rank{font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px;}
    .podium-item.rank1 .podium-rank{color:var(--link);}
    .podium-item.rank2 .podium-rank{color:var(--heading);}
    .podium-item.rank3 .podium-rank{color:var(--good);}
    .podium-name{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;color:#fff;line-height:1.2;}
    .podium-school{font-size:0.68rem;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .podium-score{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;margin-top:8px;}
    .podium-item.rank1 .podium-score{color:var(--link);}
    .podium-item.rank2 .podium-score{color:var(--heading);}
    .podium-item.rank3 .podium-score{color:var(--good);}
    .podium-badges{margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;justify-content:center;}
    .pb{font-size:0.68rem;padding:2px 7px;border-radius:10px;background:rgba(255,255,255,0.08);color:var(--text);}

    /* REST OF LIST */
    .lb-list{display:flex;flex-direction:column;gap:8px;}
    .lb-row{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;transition:border-color 0.2s;}
    .lb-row:hover{border-color:rgba(0,229,255,0.2);}
    .lb-rank-num{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;color:var(--muted);min-width:28px;text-align:center;}
    .lb-info{flex:1;}
    .lb-name{font-size:0.95rem;color:var(--text);font-weight:500;}
    .lb-school{font-size:0.72rem;color:var(--muted);margin-top:2px;}
    .lb-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
    .lb-badge{font-size:0.68rem;padding:2px 7px;border-radius:10px;background:rgba(255,213,79,0.1);color:var(--link);}
    .lb-score{font-family:'Rajdhani',sans-serif;font-size:1.1rem;font-weight:700;color:var(--link);}

    .section-title{font-family:'Rajdhani',sans-serif;font-size:0.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:20px 0 12px;display:flex;align-items:center;gap:8px;}
    .section-title::after{content:'';flex:1;height:1px;background:var(--border);}
    .empty{text-align:center;padding:32px;color:var(--muted);}
    .spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(0,229,255,0.2);border-top-color:var(--heading);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .footer{text-align:center;font-size:0.75rem;color:var(--muted);margin-top:28px;line-height:1.8;}
    .footer a{color:var(--link);text-decoration:none;}
  </style>
</head>
<body>
<div class="lb-header">
  <div class="brand">Guided Path Noida</div>
  <h1>🏆 Student Leaderboard</h1>
  <div class="subtitle">Top performers — updated every Wednesday</div>
  <div class="lb-updated" id="lastUpdated"></div>
</div>

<div class="wrap" id="lbWrap">
  <div class="empty"><span class="spinner"></span>&nbsp; Loading leaderboard...</div>
</div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzL3Kw6D2k5yU0LFeRI7ch-UQquvJ8EgxknjmcMWjRRRUHeuj92W5QKRBD9rlkj9FTzrQ/exec";

function badgeChips(badgeStr) {
  if (!badgeStr) return '';
  return badgeStr.split(',').map(b => b.trim()).filter(Boolean)
    .map(b => `<span class="lb-badge">${b}</span>`).join('');
}

function podiumBadges(badgeStr) {
  if (!badgeStr) return '';
  return badgeStr.split(',').map(b => b.trim()).filter(Boolean)
    .map(b => `<span class="pb">${b}</span>`).join('');
}

async function loadLeaderboard() {
  try {
    const res  = await fetch(`${APPS_SCRIPT_URL}?action=leaderboard`);
    const json = await res.json();
    const wrap = document.getElementById('lbWrap');

    if (json.status !== 'success' || !json.leaderboard || json.leaderboard.length === 0) {
      wrap.innerHTML = `<div class="empty">Leaderboard not yet available. Check back after Wednesday!</div>`;
      return;
    }

    document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' });

    const leaders = json.leaderboard;
    const top3    = leaders.slice(0, 3);
    const rest    = leaders.slice(3);

    // Build podium (top 3) — order: 2nd, 1st, 3rd
    const podiumOrder = [top3[1], top3[0], top3[2]].filter(Boolean);
    const rankClasses = top3[1] ? ['rank2','rank1','rank3'] : ['rank1','rank2','rank3'];
    const crowns = ['🥈','🥇','🥉'];
    const rankLabels = top3[1] ? ['2nd Place','1st Place','3rd Place'] : ['1st Place','2nd Place','3rd Place'];

    let html = `<div class="podium">`;
    podiumOrder.forEach((s, i) => {
      html += `<div class="podium-item ${rankClasses[i]}">
        <div class="podium-card">
          <div class="podium-crown">${crowns[i]}</div>
          <div class="podium-rank">${rankLabels[i]}</div>
          <div class="podium-name">${s.name}</div>
          <div class="podium-school">${s.school}</div>
          <div class="podium-score">${s.overallAvg}</div>
          <div class="podium-badges">${podiumBadges(s.badges)}</div>
        </div>
      </div>`;
    });
    html += `</div>`;

    // Rest of list
    if (rest.length > 0) {
      html += `<div class="section-title">🎯 Other Top Performers</div>`;
      html += `<div class="lb-list">`;
      rest.forEach(s => {
        html += `<div class="lb-row">
          <div class="lb-rank-num">#${s.rank}</div>
          <div class="lb-info">
            <div class="lb-name">${s.name}</div>
            <div class="lb-school">${s.school}</div>
            ${s.badges ? `<div class="lb-badges">${badgeChips(s.badges)}</div>` : ''}
          </div>
          <div class="lb-score">${s.overallAvg}</div>
        </div>`;
      });
      html += `</div>`;
    }

    html += `<div class="footer">Guided Path Noida &nbsp;·&nbsp; <a href="https://www.guidedpathnoida.in" target="_blank">guidedpathnoida.in</a><br/>Work hard. Your name could be here next week. 💪</div>`;
    wrap.innerHTML = html;

  } catch(e) {
    document.getElementById('lbWrap').innerHTML = `<div class="empty">Could not load leaderboard. Please try again.</div>`;
  }
}

loadLeaderboard();
</script>
</body>
</html>
